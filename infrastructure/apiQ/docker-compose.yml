version: '3'

services:
  rabbitmq:
    image: rabbitmq:3-management-alpine
    expose :
      - 5672
      - 15672

    ports:
      - "4369:4369"
      - "5671:5671"
      - "5672:5672"
      - "25672:25672"
      - "15671:15671"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:15672"]
      interval: 30s
      timeout: 10s
      retries: 15

  flask-api:
    build:
      context: .
      dockerfile: DockerfileFlask
    ports:
      - "5000:5000"

    depends_on:
      - rabbitmq


  nginx:
    image: nginx
    ports:
      - "8080:8080"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - flask-api


  minio:
    image: "bitnami/minio:latest"
    ports:
      - '9000:9000'
      - '9001:9001'
    networks:
      - minionetwork
    volumes:
      - './minio_data:/data'
    environment:
      - MINIO_ROOT_USER=your_username
      - MINIO_ROOT_PASSWORD=your_password

  mlflow:
    build:
      context: .
      dockerfile: DockermlFlow  # Utiliser le Dockerfile personnalisé
    ports:
      - "3000:3000"  # Changer le port ici si 6000 est déjà utilisé
    volumes:
      - ./mlruns:/mlflow/mlruns
      - ./mlflow.db:/mlflow/mlflow.db  # Assurez-vous que ce chemin est correct
    environment:
      MLFLOW_TRACKING_URI: sqlite://mlflow.db
      MLFLOW_BACKEND_STORE_URI: sqlite://mlflow.db
      MLFLOW_ARTIFACT_STORE_URI: s3://mlflow-artifacts
      AWS_ACCESS_KEY_ID: your_username
      AWS_SECRET_ACCESS_KEY: your_password
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
    command: mlflow server --backend-store-uri sqlite:///mlflow.db --default-artifact-root s3://mlflow-artifacts --host 0.0.0.0 --port 3000
    networks:
      - minionetwork

networks:
  minionetwork:
    driver: bridge

volumes:
  minio_data:
    driver: local
