openapi: 3.0.3
info:
  title: Swagger MLOPS OCRFLOW - OpenAPI 3.0
  description: |-
    Cette API MLOps de computer vision est conçue pour automatiser et simplifier les processus de benchmark, d'entraînement et d'inférence, permettant ainsi une gestion efficace des modèles de vision par ordinateur du développement initial à la mise en production. Elle offre une interface unifiée pour interagir avec les différentes étapes du cycle de vie des modèles, contribuant à des opérations ML plus fluides et plus efficaces.
    Some useful links:
    - [The source API definition for the Pet Store](https://github.com/swagger-api/swagger-petstore/blob/master/src/main/resources/openapi.yaml)
  contact:
    email: laureote-loic@hotmail.fr
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  version: 1.0.11
externalDocs:
  description: Find out more about Swagger
  url: http://swagger.io
servers:
- url: https://mlops.swagger.io/api/v3
tags:
- name: inference
  description: Inference execution and light management
- name: benchmark
  description: Create a benchmark scenario
- name: training
  description: Create a training job
- name: manage
  description: Manage the whole plateform
- name: status
  description: Component status
- name: metric
  description: Jobs Metrics
- name: user
  description: Users management
paths:
  /inference:
    get:
      tags:
      - inference
      summary: Get all Inference Jobs
      description: Retrieve all inferences
      operationId: get_inferences
      responses:
        "200":
          description: Successful operation
        "400":
          description: Invalid
        "404":
          description: Service not found
        "422":
          description: Validation exception
      x-openapi-router-controller: swagger_server.controllers.inference_controller
    post:
      tags:
      - inference
      summary: Create Inference
      description: Create Inference Job
      operationId: create_inference
      responses:
        "200":
          description: Successful operation
        "400":
          description: Invalid input
        "422":
          description: Validation exception
      x-openapi-router-controller: swagger_server.controllers.inference_controller
  /inference/findByStatus:
    get:
      tags:
      - inference
      summary: Find Inferences by status
      description: Multiple status values can be provided with comma separated strings
      operationId: find_inferences_by_status
      parameters:
      - name: status
        in: query
        description: Status values that need to be considered for filter
        required: false
        style: form
        explode: true
        schema:
          type: string
          default: waiting
          enum:
          - waiting
          - running
          - success
          - error
      responses:
        "200":
          description: successful operation
        "400":
          description: Invalid status value
      x-openapi-router-controller: swagger_server.controllers.inference_controller
  /inference/findByTags:
    get:
      tags:
      - inference
      summary: Find Inferences by tags
      description: "Multiple tags can be provided with comma separated strings. Use\
        \ tag1, tag2, tag3 for testing."
      operationId: find_inferences_by_tags
      parameters:
      - name: tags
        in: query
        description: Tags to filter by
        required: false
        style: form
        explode: true
        schema:
          type: array
          items:
            type: string
      responses:
        "200":
          description: successful operation
        "400":
          description: Invalid tag value
      x-openapi-router-controller: swagger_server.controllers.inference_controller
  /inference/{jobId}:
    get:
      tags:
      - inference
      summary: Find Inference job by jobId
      description: get inference by jobId
      operationId: get_inference_byjob_id
      parameters:
      - name: jobId
        in: path
        description: ID of job to return
        required: true
        style: simple
        explode: false
        schema:
          type: integer
          format: int64
      responses:
        "200":
          description: successful operation
        "400":
          description: Invalid ID supplied
        "404":
          description: Job not found
      x-openapi-router-controller: swagger_server.controllers.inference_controller
    put:
      tags:
      - inference
      summary: Updates Inference by jobId
      description: update inference by jobId
      operationId: update_inference_by_job_id
      parameters:
      - name: jobId
        in: path
        description: ID of pet that needs to be updated
        required: true
        style: simple
        explode: false
        schema:
          type: integer
          format: int64
      - name: name
        in: query
        description: Name of jobId that needs to be updated
        required: false
        style: form
        explode: true
        schema:
          type: string
      - name: status
        in: query
        description: Status of jobId that needs to be updated
        required: false
        style: form
        explode: true
        schema:
          type: string
      responses:
        "400":
          description: Invalid input
      x-openapi-router-controller: swagger_server.controllers.inference_controller
    delete:
      tags:
      - inference
      summary: Delete Inference By jobId
      description: delete Inference By jobId
      operationId: delete_inference_by_job_id
      parameters:
      - name: jobId
        in: path
        description: Job id to delete
        required: true
        style: simple
        explode: false
        schema:
          type: integer
          format: int64
      responses:
        "400":
          description: Invalid Job value
      x-openapi-router-controller: swagger_server.controllers.inference_controller
  /benchmark:
    get:
      tags:
      - benchmark
      summary: Get all Benchmark Jobs
      description: Get all Benchmark Jobs
      operationId: get_benchmarks
      responses:
        "200":
          description: successful operation
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  type: integer
                  format: int32
                x-content-type: application/json
      x-openapi-router-controller: swagger_server.controllers.benchmark_controller
    post:
      tags:
      - benchmark
      summary: Create a benchmark
      description: Create a benchmark
      operationId: create_benchmark
      responses:
        "200":
          description: successful operation
        "400":
          description: Invalid input
        "422":
          description: Validation exception
      x-openapi-router-controller: swagger_server.controllers.benchmark_controller
  /benchmark/{jobId}:
    get:
      tags:
      - benchmark
      summary: Get Benchmark by jobId
      description: Get Benchmark by jobId
      operationId: get_benchmark_byjob_id
      parameters:
      - name: jobId
        in: path
        description: ID of order that needs to be fetched
        required: true
        style: simple
        explode: false
        schema:
          type: integer
          format: int64
      responses:
        "200":
          description: successful operation
        "400":
          description: Invalid ID supplied
        "404":
          description: Order not found
      x-openapi-router-controller: swagger_server.controllers.benchmark_controller
    delete:
      tags:
      - benchmark
      summary: Delete Benchmark by jobId
      description: Get Benchmark by jobId
      operationId: delete_benchmark_byjob_id
      parameters:
      - name: jobId
        in: path
        description: job Id to delete
        required: true
        style: simple
        explode: false
        schema:
          type: integer
          format: int64
      responses:
        "400":
          description: Invalid ID supplied
        "404":
          description: Order not found
      x-openapi-router-controller: swagger_server.controllers.benchmark_controller
  /training:
    get:
      tags:
      - training
      summary: Get all Training Jobs
      description: Returns a map of status codes to quantities
      operationId: get_trainings
      responses:
        "200":
          description: successful operation
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  type: integer
                  format: int32
                x-content-type: application/json
      x-openapi-router-controller: swagger_server.controllers.training_controller
    post:
      tags:
      - training
      summary: Create a training
      description: Place a new order in the store
      operationId: create_training
      responses:
        "200":
          description: successful operation
        "400":
          description: Invalid input
        "422":
          description: Validation exception
      x-openapi-router-controller: swagger_server.controllers.training_controller
  /training/{jobId}:
    get:
      tags:
      - training
      summary: Get Training by jobId
      description: Get Training by jobId
      operationId: get_training_byjob_id
      parameters:
      - name: jobId
        in: path
        description: Get Training by jobId
        required: true
        style: simple
        explode: false
        schema:
          type: integer
          format: int64
      responses:
        "200":
          description: successful operation
        "400":
          description: Invalid ID supplied
        "404":
          description: Order not found
      x-openapi-router-controller: swagger_server.controllers.training_controller
    delete:
      tags:
      - training
      summary: Delete Training by jobId
      description: Delete Training by jobId
      operationId: delete_training_byjob_id
      parameters:
      - name: jobId
        in: path
        description: ID of the order that needs to be deleted
        required: true
        style: simple
        explode: false
        schema:
          type: integer
          format: int64
      responses:
        "400":
          description: Invalid ID supplied
        "404":
          description: Order not fou
      x-openapi-router-controller: swagger_server.controllers.training_controller
  /manage/exchange:
    get:
      tags:
      - manage
      summary: Manage Exchanges
      description: Manage Exchanges
      operationId: get_exchanges
      responses:
        "200":
          description: successful operation
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  type: integer
                  format: int32
                x-content-type: application/json
      x-openapi-router-controller: swagger_server.controllers.manage_controller
  /manage/queues:
    get:
      tags:
      - manage
      summary: Manage Queues
      description: Manage Queues
      operationId: get_queues
      responses:
        "200":
          description: successful operation
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  type: integer
                  format: int32
                x-content-type: application/json
      x-openapi-router-controller: swagger_server.controllers.manage_controller
  /manage/datasets:
    get:
      tags:
      - manage
      summary: Manage Datasets
      description: Manage Datasets
      operationId: get_datasets
      responses:
        "200":
          description: successful operation
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  type: integer
                  format: int32
                x-content-type: application/json
      x-openapi-router-controller: swagger_server.controllers.manage_controller
  /manage/models:
    get:
      tags:
      - manage
      summary: Manage Models
      description: Manage Models
      operationId: get_models
      responses:
        "200":
          description: successful operation
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  type: integer
                  format: int32
                x-content-type: application/json
      x-openapi-router-controller: swagger_server.controllers.manage_controller
  /status/jobs:
    get:
      tags:
      - status
      summary: Get all Jobs Status
      description: Get all Jobs Status
      operationId: gets_jobs
      responses:
        "200":
          description: successful operation
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  type: integer
                  format: int32
                x-content-type: application/json
      x-openapi-router-controller: swagger_server.controllers.status_controller
  /status/consumers:
    get:
      tags:
      - status
      summary: Get All Consumers Status
      description: Get All Consumers Status
      operationId: get_consumers
      responses:
        "200":
          description: successful operation
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  type: integer
                  format: int32
                x-content-type: application/json
      x-openapi-router-controller: swagger_server.controllers.status_controller
  /status/jobs/{jobId}:
    get:
      tags:
      - status
      summary: Get Job by jobId
      description: Get Job by jobId
      operationId: get_job_byjob_id
      parameters:
      - name: jobId
        in: path
        description: ID of order that needs to be fetched
        required: true
        style: simple
        explode: false
        schema:
          type: integer
          format: int64
      responses:
        "200":
          description: successful operation
        "400":
          description: Invalid ID supplied
        "404":
          description: Job not found
      x-openapi-router-controller: swagger_server.controllers.status_controller
  /status/consumers/{nodeId}:
    get:
      tags:
      - status
      summary: Get Consumer by nodeId
      description: Get Consumer by nodeId
      operationId: get_node_bynode_id
      parameters:
      - name: nodeId
        in: path
        description: ID of order that needs to be fetched
        required: true
        style: simple
        explode: false
        schema:
          type: integer
          format: int64
      responses:
        "200":
          description: successful operation
        "400":
          description: Invalid ID supplied
        "404":
          description: Node not found
      x-openapi-router-controller: swagger_server.controllers.status_controller
  /metric/:
    get:
      tags:
      - metric
      summary: Get All Metrics
      description: Get All Metrics
      operationId: get_metrics
      responses:
        "200":
          description: successful operation
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  type: integer
                  format: int32
                x-content-type: application/json
      x-openapi-router-controller: swagger_server.controllers.metric_controller
  /metric/{jobId}:
    get:
      tags:
      - metric
      summary: Get Metrics by jobId
      description: Get Metrics by jobId
      operationId: get_metrics_by_id
      parameters:
      - name: jobId
        in: path
        description: Metrics
        required: true
        style: simple
        explode: false
        schema:
          type: integer
          format: int64
      responses:
        "200":
          description: successful operation
        "400":
          description: Invalid ID supplied
        "404":
          description: Order not found
      x-openapi-router-controller: swagger_server.controllers.metric_controller
  /user:
    post:
      tags:
      - user
      summary: Create user
      description: This can only be done by the logged in user.
      operationId: create_user
      requestBody:
        description: Created user object
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/User'
          application/xml:
            schema:
              $ref: '#/components/schemas/User'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/User'
      responses:
        default:
          description: successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
            application/xml:
              schema:
                $ref: '#/components/schemas/User'
      x-openapi-router-controller: swagger_server.controllers.user_controller
  /user/createWithList:
    post:
      tags:
      - user
      summary: Creates list of users with given input array
      description: Creates list of users with given input array
      operationId: create_users_with_list_input
      requestBody:
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/User'
      responses:
        "200":
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
            application/xml:
              schema:
                $ref: '#/components/schemas/User'
        default:
          description: successful operation
      x-openapi-router-controller: swagger_server.controllers.user_controller
  /user/login:
    get:
      tags:
      - user
      summary: Logs user into the system
      description: ""
      operationId: login_user
      parameters:
      - name: username
        in: query
        description: The user name for login
        required: false
        style: form
        explode: true
        schema:
          type: string
      - name: password
        in: query
        description: The password for login in clear text
        required: false
        style: form
        explode: true
        schema:
          type: string
      responses:
        "200":
          description: successful operation
          headers:
            X-Rate-Limit:
              description: calls per hour allowed by the user
              style: simple
              explode: false
              schema:
                type: integer
                format: int32
            X-Expires-After:
              description: date in UTC when token expires
              style: simple
              explode: false
              schema:
                type: string
                format: date-time
          content:
            application/xml:
              schema:
                type: string
                x-content-type: application/xml
            application/json:
              schema:
                type: string
        "400":
          description: Invalid username/password supplied
      x-openapi-router-controller: swagger_server.controllers.user_controller
  /user/logout:
    get:
      tags:
      - user
      summary: Logs out current logged in user session
      description: ""
      operationId: logout_user
      parameters: []
      responses:
        default:
          description: successful operation
      x-openapi-router-controller: swagger_server.controllers.user_controller
  /user/{username}:
    get:
      tags:
      - user
      summary: Get user by user name
      description: ""
      operationId: get_user_by_name
      parameters:
      - name: username
        in: path
        description: 'The name that needs to be fetched. Use user1 for testing. '
        required: true
        style: simple
        explode: false
        schema:
          type: string
      responses:
        "200":
          description: successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
            application/xml:
              schema:
                $ref: '#/components/schemas/User'
        "400":
          description: Invalid username supplied
        "404":
          description: User not found
      x-openapi-router-controller: swagger_server.controllers.user_controller
    put:
      tags:
      - user
      summary: Update user
      description: This can only be done by the logged in user.
      operationId: update_user
      parameters:
      - name: username
        in: path
        description: name that need to be deleted
        required: true
        style: simple
        explode: false
        schema:
          type: string
      requestBody:
        description: Update an existent user in the store
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/User'
          application/xml:
            schema:
              $ref: '#/components/schemas/User'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/User'
      responses:
        default:
          description: successful operation
      x-openapi-router-controller: swagger_server.controllers.user_controller
    delete:
      tags:
      - user
      summary: Delete user
      description: This can only be done by the logged in user.
      operationId: delete_user
      parameters:
      - name: username
        in: path
        description: The name that needs to be deleted
        required: true
        style: simple
        explode: false
        schema:
          type: string
      responses:
        "400":
          description: Invalid username supplied
        "404":
          description: User not found
      x-openapi-router-controller: swagger_server.controllers.user_controller
components:
  schemas:
    Address:
      type: object
      properties:
        street:
          type: string
          example: 437 Lytton
        city:
          type: string
          example: Palo Alto
        state:
          type: string
          example: CA
        zip:
          type: string
          example: "94301"
      xml:
        name: address
    Category:
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 1
        name:
          type: string
          example: Dogs
      xml:
        name: category
    User:
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 10
        username:
          type: string
          example: theUser
        firstName:
          type: string
          example: John
        lastName:
          type: string
          example: James
        email:
          type: string
          example: john@email.com
        password:
          type: string
          example: "12345"
        phone:
          type: string
          example: "12345"
        userStatus:
          type: integer
          description: User Status
          format: int32
          example: 1
      example:
        firstName: John
        lastName: James
        password: "12345"
        userStatus: 1
        phone: "12345"
        id: 10
        email: john@email.com
        username: theUser
      xml:
        name: user
    Tag:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
      xml:
        name: tag
    ApiResponse:
      type: object
      properties:
        code:
          type: integer
          format: int32
        type:
          type: string
        message:
          type: string
      xml:
        name: '##default'
  requestBodies:
    UserArray:
      description: List of user object
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: '#/components/schemas/User'

